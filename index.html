<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyPixel Drone Show</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;600;800&display=swap');
        
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #030305;
            font-family: 'Montserrat', sans-serif;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        #ui {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            pointer-events: none;
            z-index: 10;
            width: 95%;
            max-width: 1200px;
        }
        .controls {
            display: flex;
            flex-wrap: nowrap;
            justify-content: flex-start;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            width: 100%;
            gap: 10px;
            pointer-events: auto;
            background: rgba(10, 10, 15, 0.6);
            padding: 15px 20px;
            border-radius: 24px;
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 15px 40px rgba(0,0,0,0.8), inset 0 1px 0 rgba(255,255,255,0.1);
        }
        .controls::-webkit-scrollbar {
            display: none;
        }
        .controls {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        button {
            background: rgba(255, 255, 255, 0.03);
            color: #ccc;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 10px 20px;
            font-size: 13px;
            font-weight: 600;
            font-family: 'Montserrat', sans-serif;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            letter-spacing: 0.5px;
            text-transform: uppercase;
            flex-shrink: 0;
        }
        button:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border-color: rgba(255,255,255,0.5);
            transform: translateY(-4px);
            box-shadow: 0 5px 15px rgba(255,255,255,0.1);
        }
        button.active {
            background: #fff;
            color: #000;
            border-color: #fff;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.6);
            transform: scale(1.05);
        }
        .header {
            position: absolute;
            top: 25px;
            left: 20px;
            color: #fff;
            pointer-events: none;
            z-index: 10;
        }
        .header h1 {
            margin: 0;
            font-size: clamp(22px, 5vw, 32px);
            font-weight: 800;
            letter-spacing: 4px;
            text-transform: uppercase;
            text-shadow: 0 4px 20px rgba(0,0,0,0.9);
            background: linear-gradient(90deg, #fff, #aaa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header p {
            margin: 8px 0 0 0;
            font-size: 14px;
            font-weight: 300;
            color: #888;
            letter-spacing: 1px;
        }
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 20px;
            font-weight: 600;
            letter-spacing: 3px;
            text-align: center;
            transition: opacity 0.8s;
            background: rgba(5, 5, 8, 0.9);
            padding: 40px 60px;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.1);
            z-index: 100;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
        }
        .spinner {
            margin: 25px auto 0;
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top: 3px solid #fff;
            border-radius: 50%;
            animation: spin 1s cubic-bezier(0.5, 0.1, 0.4, 0.9) infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
    <!-- Import Three.js and Addons -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>

    <div class="header">
        <h1>SKYPIXEL</h1>
        <p>Interactive Drone Engine &bull; Drag to explore</p>
    </div>

    <div id="loading">
        <div>INITIALIZING DRONE SWARM</div>
        <div class="spinner"></div>
    </div>

    <div id="ui">
        <div class="controls">
            <button id="btn-0" onclick="window.setDroneState(0)">Ground</button>
            <button id="btn-1" onclick="window.setDroneState(1)">TAJBank</button>
            <button id="btn-2" onclick="window.setDroneState(2)">Ramadan</button>
            <button id="btn-3" onclick="window.setDroneState(3)">Eid Mubarak</button>
            <button id="btn-4" onclick="window.setDroneState(4)">Laylatul Qadr</button>
            <button id="btn-5" onclick="window.setDroneState(5)">Zakat</button>
            <button id="btn-6" onclick="window.setDroneState(6)">Nigeria</button>
            <button id="btn-7" onclick="window.setDroneState(7)">Mosque</button>
        </div>
    </div>

    <div id="canvas-container"></div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

        // --- Mobile Detection ---
        const isMobile = window.innerWidth <= 768;

        // --- Core Configuration ---
        const DRONE_COUNT = isMobile ? 12000 : 25000;
        const CANVAS_W = 1600;
        const CANVAS_H = 900;
        const STRIDE = isMobile ? 5 : 3;
        
        // Scene variables
        let scene, camera, renderer, controls, composer;
        let droneSystem, positions, targets, colors, targetColors, velocities;
        let pointSets = {};
        let currentState = -1;
        let clock = new THREE.Clock();
        
        // Physics variables for beautiful organic movement
        const SPRING_STRENGTH = 0.003; 
        const DAMPING = 0.88;

        // Internal rendering canvas for shape extraction
        const extractCanvas = document.createElement('canvas');
        extractCanvas.width = CANVAS_W;
        extractCanvas.height = CANVAS_H;
        const ctx = extractCanvas.getContext('2d', { willReadFrequently: true });

        init();

        async function init() {
            const container = document.getElementById('canvas-container');
            
            // 1. Core Scene Setup
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x030306, 0.0008); // Deeper atmospheric fog

            camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 1, 5000);
            // STATIC CAMERA POSITION
            camera.position.set(0, 100, isMobile ? 1200 : 850);

            renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: "high-performance" });
            renderer.setPixelRatio(isMobile ? 1 : Math.min(window.devicePixelRatio, 2)); 
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setClearColor(0x020204);
            container.appendChild(renderer.domElement);

            // 2. Post-Processing (Tighter Bloom for Crisper Glow)
            const renderScene = new RenderPass(scene, camera);
            // Tuned bloom pass: slightly tighter radius and distinct threshold for extreme quality
            const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.25, 0.15);
            
            composer = new EffectComposer(renderer);
            composer.addPass(renderScene);
            composer.addPass(bloomPass);

            // 3. Camera Controls
            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.04;
            controls.maxPolarAngle = Math.PI / 2 + 0.02; // Prevent going deeply underground
            controls.minDistance = 150;
            controls.maxDistance = 2500;
            controls.target.set(0, 100, 0);

            // 4. Environment
            createEnvironment();

            // 5. Procedurally Draw and Extract all Formations
            await generateFormations();

            // 6. Initialize Physics Arrays and Drone Mesh
            setupDrones();

            // 7. Reveal & Start
            document.getElementById('loading').style.opacity = 0;
            setTimeout(() => { document.getElementById('loading').style.display = 'none'; }, 800);
            
            // Auto start show with TAJBank
            setTimeout(() => { window.setDroneState(1); }, 1500);

            window.addEventListener('resize', onWindowResize);
            animate();
        }

        function createEnvironment() {
            // Dark mirror-like ground
            const groundGeo = new THREE.PlaneGeometry(5000, 5000);
            const groundMat = new THREE.MeshBasicMaterial({ color: 0x050508, depthWrite: false, transparent: true, opacity: 0.8 });
            const ground = new THREE.Mesh(groundGeo, groundMat);
            ground.rotation.x = -Math.PI / 2;
            ground.position.y = -10;
            scene.add(ground);
        }

        async function generateFormations() {
            // Ground State (0) - Neatly arranged grid
            pointSets[0] = [];
            let gridSize = Math.ceil(Math.sqrt(DRONE_COUNT));
            let spacing = 15;
            let offset = (gridSize * spacing) / 2;
            
            for (let i = 0; i < DRONE_COUNT; i++) {
                let r = Math.floor(i / gridSize);
                let c = i % gridSize;
                pointSets[0].push({
                    x: c * spacing - offset,
                    y: -5, // Rest on ground
                    z: r * spacing - offset + 200,
                    r: 0.05, g: 0.1, b: 0.2 // Very dim standby blue
                });
            }

            // Define drawing instructions
            const frames = [
                { id: 1, draw: drawTajBank, scale: 0.45, yOffset: 120 },
                { id: 2, draw: drawRamadan, scale: 0.45, yOffset: 140 },
                { id: 3, draw: drawEidMubarak, scale: 0.5, yOffset: 140 },
                { id: 4, draw: drawLaylatulQadr, scale: 0.45, yOffset: 140 },
                { id: 5, draw: drawZakat, scale: 0.45, yOffset: 140 },
                { id: 6, draw: drawNigeriaMap, scale: 0.45, yOffset: 150 },
                { id: 7, draw: drawMosque, scale: 0.5, yOffset: 150 }
            ];

            // Render each to canvas and extract pixels
            for (const frame of frames) {
                await new Promise(r => setTimeout(r, 10)); // Prevent thread blocking
                ctx.clearRect(0, 0, CANVAS_W, CANVAS_H);
                ctx.fillStyle = '#000';
                ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
                frame.draw(ctx);
                
                // Extract points with a precision stride to get exactly the right density
                pointSets[frame.id] = extractPoints(frame.scale, frame.yOffset);
            }
        }

        // --- UPGRADED, HIGH-QUALITY SHAPE DRAWING FUNCTIONS ---

        function drawTajBank(ctx) {
            ctx.textBaseline = 'middle';
            const cx = CANVAS_W/2;
            const cy = CANVAS_H/2;
            
            // Re-centered configuration to balance the logo perfectly
            const caretX = cx - 210; 
            const letterY = cy + 20;
            
            // 1. Red Stylized Caret (The shield/roof shape)
            let caretGrad = ctx.createLinearGradient(caretX, cy - 300, caretX, cy + 100);
            caretGrad.addColorStop(0, '#FF2222'); // Brilliant Red
            caretGrad.addColorStop(1, '#CC0000'); // Deep Red
            ctx.fillStyle = caretGrad;
            
            ctx.beginPath();
            const py = cy + 100;
            ctx.moveTo(caretX, py - 260);      // Top peak
            ctx.lineTo(caretX - 90, py);       // Bottom left
            ctx.lineTo(caretX - 30, py);       // Inner bottom left
            ctx.lineTo(caretX, py - 140);      // Inner peak
            ctx.lineTo(caretX + 30, py);       // Inner bottom right
            ctx.lineTo(caretX + 90, py);       // Bottom right
            ctx.fill();
            
            // Red Dot above the caret
            ctx.beginPath(); 
            ctx.arc(caretX, py - 320, 32, 0, Math.PI*2); 
            ctx.fill();

            // 2. The Letter 'T' and 'J' (Same Red Gradient)
            ctx.fillStyle = caretGrad;
            ctx.font = '900 280px "Arial Black", Arial, sans-serif';
            ctx.fillText("T", caretX - 220, letterY);
            ctx.fillText("J", caretX + 110, letterY);
            
            // 3. 'Bank' text (Crisp Pure White)
            ctx.fillStyle = '#FFFFFF'; 
            ctx.font = '800 240px "Arial Black", Arial, sans-serif';
            ctx.fillText("Bank", caretX + 270, letterY);
        }

        function drawRamadan(ctx) {
            const cx = CANVAS_W/2;
            const cy = CANVAS_H/2;

            // Moved moon high up and centered to prevent overlap
            let moonGrad = ctx.createLinearGradient(cx - 200, cy - 300, cx + 100, cy);
            moonGrad.addColorStop(0, '#FFD700');
            moonGrad.addColorStop(1, '#FF8800');
            ctx.fillStyle = moonGrad;
            
            ctx.beginPath(); 
            ctx.arc(cx, cy - 180, 220, 0, Math.PI*2); 
            ctx.fill();
            
            ctx.globalCompositeOperation = 'destination-out';
            ctx.beginPath(); 
            ctx.arc(cx + 80, cy - 220, 200, 0, Math.PI*2); 
            ctx.fill();
            ctx.globalCompositeOperation = 'source-over';

            // Lantern hanging correctly beside the moon
            ctx.fillStyle = '#FFC107';
            const lx = cx - 180;
            const ly = cy - 20;
            ctx.fillRect(lx - 2, ly - 80, 4, 80); // Chain
            ctx.beginPath(); ctx.moveTo(lx - 40, ly); ctx.lineTo(lx + 40, ly); ctx.lineTo(lx + 50, ly + 90); ctx.lineTo(lx - 50, ly + 90); ctx.fill(); // Body
            ctx.beginPath(); ctx.arc(lx, ly, 40, Math.PI, 0); ctx.fill(); // Dome
            ctx.fillRect(lx - 30, ly + 90, 60, 20); // Base
            ctx.fillStyle = '#FFF5CC'; // Lantern glow
            ctx.beginPath(); ctx.moveTo(lx - 20, ly + 10); ctx.lineTo(lx + 20, ly + 10); ctx.lineTo(lx + 25, ly + 80); ctx.lineTo(lx - 25, ly + 80); ctx.fill();
            
            // Text nicely organized below the shapes
            ctx.fillStyle = '#FFFFFF';
            ctx.textAlign = 'center';
            ctx.font = 'bold 120px "Times New Roman", Times, serif';
            ctx.fillText("رمضان كريم", cx, cy + 120);
            
            ctx.font = '900 65px "Montserrat", Arial, sans-serif';
            ctx.fillText("RAMADAN KAREEM", cx, cy + 220);
            
            let naijaGrad = ctx.createLinearGradient(cx - 200, cy, cx + 200, cy);
            naijaGrad.addColorStop(0, '#00FF44');
            naijaGrad.addColorStop(1, '#00CC33');
            ctx.fillStyle = naijaGrad;
            ctx.font = '600 50px "Montserrat", Arial, sans-serif';
            ctx.fillText("N I G E R I A", cx, cy + 300);
            ctx.textAlign = 'left'; 
        }

        function drawEidMubarak(ctx) {
            const cx = CANVAS_W/2;
            const cy = CANVAS_H/2;

            // Skyline silhouette (Pushed down)
            ctx.fillStyle = 'rgba(20, 20, 40, 0.9)';
            ctx.fillRect(cx - 800, cy + 350, 1600, 100);
            for(let i=0; i<15; i++) {
                let w = 40 + Math.random() * 80;
                let h = 50 + Math.random() * 120;
                ctx.fillRect(cx - 700 + i*100, cy + 350 - h, w, h);
                ctx.fillStyle = '#FFFFaa';
                if(Math.random() > 0.5) ctx.fillRect(cx - 680 + i*100, cy + 380 - h, 10, 10);
                ctx.fillStyle = 'rgba(20, 20, 40, 0.9)';
            }

            // High-Quality Fireworks (Pushed high up to avoid text)
            const drawFirework = (x, y, color1, color2, size, density) => {
                for(let r=0; r<density; r++) {
                    let angle = (r/density) * Math.PI*2;
                    for(let d=10; d<size; d+=12) {
                        ctx.fillStyle = (d > size/2) ? color2 : color1;
                        ctx.beginPath();
                        ctx.arc(x + Math.cos(angle)*d, y + Math.sin(angle)*d, 4, 0, Math.PI*2);
                        ctx.fill();
                    }
                }
            };

            drawFirework(cx - 500, cy - 250, '#FFFFFF', '#FF2A55', 180, 24);
            drawFirework(cx + 450, cy - 300, '#FFFFFF', '#2AFFFF', 220, 28);
            drawFirework(cx - 250, cy - 100, '#FFFFFF', '#55FF2A', 140, 20);
            drawFirework(cx + 300, cy - 100, '#FFFFFF', '#FFC107', 160, 22);

            // Centered Text given plenty of breathing room
            let textGrad = ctx.createLinearGradient(0, cy + 50, 0, cy + 200);
            textGrad.addColorStop(0, '#FFFFFF');
            textGrad.addColorStop(1, '#FFD700');
            ctx.fillStyle = textGrad;
            ctx.textAlign = 'center';
            ctx.font = 'italic 900 140px "Georgia", serif';
            ctx.fillText("Eid Mubarak", cx, cy + 120);
            
            ctx.fillStyle = '#FFFFFF';
            ctx.font = '800 55px "Montserrat", Arial, sans-serif';
            ctx.fillText("BARKA DA SALLAH", cx, cy + 220);
            ctx.textAlign = 'left';
        }

        function drawLaylatulQadr(ctx) {
            const cx = CANVAS_W/2;
            const cy = CANVAS_H/2;

            // Golden Rehal (Wooden Stand)
            ctx.strokeStyle = '#8B4513'; 
            ctx.lineWidth = 25;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.beginPath(); ctx.moveTo(cx - 150, cy + 150); ctx.lineTo(cx + 150, cy + 30); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(cx + 150, cy + 150); ctx.lineTo(cx - 150, cy + 30); ctx.stroke();

            // Glowing Quran
            let quranGrad = ctx.createLinearGradient(cx - 200, cy - 100, cx + 200, cy + 100);
            quranGrad.addColorStop(0, '#00FFFF');
            quranGrad.addColorStop(1, '#0088FF');
            ctx.strokeStyle = quranGrad;
            ctx.fillStyle = quranGrad;
            ctx.lineWidth = 15;
            
            const bx = cx;
            const by = cy + 40;
            
            ctx.beginPath();
            ctx.moveTo(bx, by);
            ctx.quadraticCurveTo(bx - 120, by - 50, bx - 300, by - 20); 
            ctx.lineTo(bx - 320, by - 160); 
            ctx.quadraticCurveTo(bx - 120, by - 190, bx, by - 100); 
            ctx.quadraticCurveTo(bx + 120, by - 190, bx + 320, by - 160); 
            ctx.lineTo(bx + 300, by - 20); 
            ctx.quadraticCurveTo(bx + 120, by - 50, bx, by); 
            ctx.fill();

            // Beams of light coming from the book
            ctx.strokeStyle = 'rgba(0, 255, 255, 0.5)';
            ctx.lineWidth = 6;
            for(let i=0; i<7; i++) {
                ctx.beginPath();
                ctx.moveTo(cx, cy - 80);
                ctx.lineTo(cx - 400 + (i*130), cy - 450);
                ctx.stroke();
            }
            
            // Text safely positioned away from Rehal
            ctx.fillStyle = '#FFFFFF';
            ctx.textAlign = 'center';
            ctx.font = '800 65px "Montserrat"';
            ctx.fillText("LAYLATUL QADR", cx, cy + 280);
            ctx.font = '600 35px "Montserrat"';
            ctx.fillText("The Night of Power", cx, cy + 350);
            ctx.textAlign = 'left';
        }

        function drawZakat(ctx) {
            const cx = CANVAS_W/2;
            const cy = CANVAS_H/2;

            ctx.strokeStyle = '#FFFFFF';
            ctx.fillStyle = '#FFFFFF';
            ctx.lineWidth = 15;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';

            // Top Hand (Giving)
            ctx.beginPath();
            ctx.moveTo(cx + 400, cy - 250); // Arm
            ctx.lineTo(cx + 150, cy - 130); // Wrist
            ctx.lineTo(cx + 50, cy - 130); // Palm
            ctx.quadraticCurveTo(cx - 20, cy - 130, cx - 20, cy - 100); 
            ctx.quadraticCurveTo(cx + 20, cy - 80, cx + 100, cy - 80); 
            ctx.stroke();
            ctx.beginPath(); ctx.moveTo(cx + 100, cy - 130); ctx.quadraticCurveTo(cx + 80, cy - 180, cx + 130, cy - 190); ctx.stroke();

            // Bottom Hand (Receiving)
            ctx.beginPath();
            ctx.moveTo(cx - 400, cy + 150); // Arm
            ctx.lineTo(cx - 150, cy + 70); // Wrist
            ctx.lineTo(cx - 50, cy + 70); // Palm base
            ctx.quadraticCurveTo(cx + 80, cy + 70, cx + 80, cy + 20); 
            ctx.quadraticCurveTo(cx + 20, cy + 20, cx - 50, cy + 50); 
            ctx.stroke();

            // Glowing Gold Coin (Zakat) properly centered
            let coinGrad = ctx.createRadialGradient(cx, cy - 60, 10, cx, cy - 60, 60);
            coinGrad.addColorStop(0, '#FFFFFF');
            coinGrad.addColorStop(0.3, '#FFD700');
            coinGrad.addColorStop(1, '#B8860B');
            ctx.fillStyle = coinGrad;
            ctx.beginPath();
            ctx.arc(cx, cy - 60, 45, 0, Math.PI*2);
            ctx.fill();

            // Text spaced perfectly at the bottom
            ctx.fillStyle = '#FFC107';
            ctx.textAlign = 'center';
            ctx.font = '900 75px "Montserrat", sans-serif';
            ctx.fillText("ZAKAT & CHARITY", cx, cy + 220);
            ctx.fillStyle = '#FFFFFF';
            ctx.font = '700 40px "Montserrat", sans-serif';
            ctx.fillText("Purify Your Wealth", cx, cy + 290);
            ctx.textAlign = 'left';
        }

        function drawNigeriaMap(ctx) {
            const cx = CANVAS_W/2;
            const cy = CANVAS_H/2 - 20;

            let mapGrad = ctx.createLinearGradient(cx - 300, cy - 300, cx + 300, cy + 300);
            mapGrad.addColorStop(0, '#00FF44');
            mapGrad.addColorStop(0.5, '#FFFFFF');
            mapGrad.addColorStop(1, '#00FF44');
            
            ctx.strokeStyle = '#00FF44'; 
            ctx.fillStyle = mapGrad;
            ctx.lineWidth = 12;
            ctx.lineJoin = 'round';
            
            ctx.beginPath();
            ctx.moveTo(cx - 250, cy - 250); 
            ctx.lineTo(cx - 50, cy - 300);  
            ctx.lineTo(cx + 250, cy - 200); 
            ctx.lineTo(cx + 380, cy - 50);  
            ctx.lineTo(cx + 250, cy + 180); 
            ctx.lineTo(cx + 80, cy + 320);  
            ctx.lineTo(cx - 150, cy + 250); 
            ctx.lineTo(cx - 280, cy + 50);  
            ctx.closePath();
            
            ctx.globalAlpha = 0.5;
            ctx.fill();
            ctx.globalAlpha = 1.0;
            ctx.stroke();

            ctx.fillStyle = '#006600';
            ctx.beginPath(); ctx.arc(cx, cy, 60, 0, Math.PI*2); ctx.fill();
            ctx.globalCompositeOperation = 'destination-out';
            ctx.beginPath(); ctx.arc(cx + 15, cy - 15, 50, 0, Math.PI*2); ctx.fill();
            ctx.globalCompositeOperation = 'source-over';

            const drawCity = (x, y, name) => {
                ctx.fillStyle = '#FFFFFF';
                ctx.beginPath(); ctx.arc(x, y, 15, 0, Math.PI*2); ctx.fill();
                ctx.font = '800 35px "Montserrat"';
                ctx.fillText(name, x + 25, y + 10);
            };

            drawCity(cx - 200, cy + 180, "Lagos");
            drawCity(cx + 50, cy - 150, "Kano");
            drawCity(cx + 10, cy + 50, "Abuja");
        }

        function drawMosque(ctx) {
            const cx = CANVAS_W/2;
            const cy = CANVAS_H/2 - 30; // Shift entire mosque up to prevent cutoff
            
            let domeGrad = ctx.createRadialGradient(cx, cy, 10, cx, cy + 100, 250);
            domeGrad.addColorStop(0, '#FFF5CC');
            domeGrad.addColorStop(1, '#FFC107');
            ctx.fillStyle = domeGrad; 
            
            ctx.beginPath(); 
            ctx.arc(cx, cy + 120, 220, Math.PI, 0); 
            ctx.fill();
            
            ctx.globalCompositeOperation = 'destination-out';
            ctx.lineWidth = 10;
            for(let i=1; i<6; i++) {
                ctx.beginPath();
                ctx.ellipse(cx, cy + 120, 40*i, 220, 0, Math.PI, 0, true);
                ctx.stroke();
            }
            ctx.globalCompositeOperation = 'source-over';
            
            ctx.fillStyle = '#FFC107';
            ctx.fillRect(cx - 5, cy - 180, 10, 80);
            ctx.beginPath(); ctx.arc(cx, cy - 210, 35, 0, Math.PI*2); ctx.fill();
            ctx.globalCompositeOperation = 'destination-out';
            ctx.beginPath(); ctx.arc(cx - 12, cy - 225, 30, 0, Math.PI*2); ctx.fill();
            ctx.globalCompositeOperation = 'source-over';

            ctx.fillStyle = '#FFC107';
            ctx.fillRect(cx - 320, cy + 120, 640, 180);

            for(let i=0; i<4; i++) {
                let ax = cx - 225 + (i * 150);
                ctx.globalCompositeOperation = 'destination-out';
                ctx.beginPath(); ctx.arc(ax, cy + 200, 50, Math.PI, 0); ctx.fillRect(ax - 50, cy + 200, 100, 100); ctx.fill();
                ctx.globalCompositeOperation = 'source-over';
                ctx.fillStyle = '#00FFFF';
                ctx.beginPath(); ctx.arc(ax, cy + 200, 40, Math.PI, 0); ctx.fillRect(ax - 40, cy + 200, 80, 100); ctx.fill();
            }

            ctx.fillStyle = '#FFC107';
            const drawMinaret = (x) => {
                ctx.fillRect(x - 25, cy - 150, 50, 450); 
                ctx.beginPath(); ctx.arc(x, cy - 150, 40, Math.PI, 0); ctx.fill(); 
                ctx.fillRect(x - 5, cy - 220, 10, 70); 
                ctx.fillRect(x - 45, cy - 40, 90, 20);
                ctx.fillRect(x - 45, cy + 80, 90, 20);
            };
            drawMinaret(cx - 400);
            drawMinaret(cx + 400);

            ctx.strokeStyle = 'rgba(255, 255, 255, 0.4)';
            ctx.lineWidth = 6;
            ctx.lineCap = 'round';
            for(let i=0; i<5; i++) {
                ctx.beginPath(); ctx.moveTo(cx - 420, cy + 50); ctx.lineTo(cx - 800, cy - 150 + i*60); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(cx + 420, cy + 50); ctx.lineTo(cx + 800, cy - 150 + i*60); ctx.stroke();
            }
        }

        function extractPoints(scaleMult, yOffset) {
            const imgData = ctx.getImageData(0, 0, CANVAS_W, CANVAS_H);
            const data = imgData.data;
            const points = [];

            for (let y = 0; y < CANVAS_H; y += STRIDE) {
                for (let x = 0; x < CANVAS_W; x += STRIDE) {
                    const i = (y * CANVAS_W + x) * 4;
                    const r = data[i];
                    const g = data[i+1];
                    const b = data[i+2];
                    const a = data[i+3];

                    // Tighter alpha threshold prevents anti-aliasing edge artifacts (cleaner text)
                    if (a > 150 && (r > 20 || g > 20 || b > 20)) {
                        let depth = (r + g + b) / 765; 
                        
                        points.push({
                            x: (x - CANVAS_W / 2) * scaleMult,
                            y: -(y - CANVAS_H / 2) * scaleMult + yOffset,
                            // Reduced Z-depth extrusion significantly to prevent side-angle clouding & overlapping
                            z: (depth * 15) - 7.5, 
                            r: r / 255,
                            g: g / 255,
                            b: b / 255
                        });
                    }
                }
            }
            return points.sort(() => Math.random() - 0.5);
        }

        function createLEDTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 64; canvas.height = 64;
            const context = canvas.getContext('2d');
            
            const grad = context.createRadialGradient(32, 32, 2, 32, 32, 30);
            grad.addColorStop(0, 'rgba(255, 255, 255, 1)');
            grad.addColorStop(0.2, 'rgba(255, 255, 255, 0.9)');
            grad.addColorStop(0.5, 'rgba(255, 255, 255, 0.2)');
            grad.addColorStop(1, 'rgba(0, 0, 0, 0)');
            
            context.fillStyle = grad;
            context.fillRect(0, 0, 64, 64);
            return new THREE.CanvasTexture(canvas);
        }

        function setupDrones() {
            const geometry = new THREE.BufferGeometry();
            
            positions = new Float32Array(DRONE_COUNT * 3);
            targets = new Float32Array(DRONE_COUNT * 3);
            colors = new Float32Array(DRONE_COUNT * 3);
            targetColors = new Float32Array(DRONE_COUNT * 3);
            velocities = new Float32Array(DRONE_COUNT * 3);

            const initialPoints = pointSets[0];
            for (let i = 0; i < DRONE_COUNT; i++) {
                const pt = initialPoints[i];
                let i3 = i * 3;
                
                positions[i3] = pt.x; positions[i3+1] = pt.y; positions[i3+2] = pt.z;
                targets[i3] = pt.x; targets[i3+1] = pt.y; targets[i3+2] = pt.z;
                
                colors[i3] = pt.r; colors[i3+1] = pt.g; colors[i3+2] = pt.b;
                targetColors[i3] = pt.r; targetColors[i3+1] = pt.g; targetColors[i3+2] = pt.b;
                
                velocities[i3] = 0; velocities[i3+1] = 0; velocities[i3+2] = 0;
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

            const material = new THREE.PointsMaterial({
                size: 5.5, 
                map: createLEDTexture(),
                vertexColors: true,
                transparent: true,
                opacity: 0.9,
                blending: THREE.AdditiveBlending,
                depthWrite: false
            });

            droneSystem = new THREE.Points(geometry, material);
            scene.add(droneSystem);
        }

        window.setDroneState = function(stateIndex) {
            currentState = stateIndex;
            const points = pointSets[stateIndex];
            const pLen = points.length;

            if(!points || pLen === 0) return;

            document.querySelectorAll('button').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`btn-${stateIndex}`).classList.add('active');

            for (let i = 0; i < DRONE_COUNT; i++) {
                let i3 = i * 3;
                
                if (i < pLen) {
                    const pt = points[i]; 
                    targets[i3] = pt.x;
                    targets[i3+1] = pt.y;
                    targets[i3+2] = pt.z;
                    
                    targetColors[i3] = pt.r;
                    targetColors[i3+1] = pt.g;
                    targetColors[i3+2] = pt.b;
                } else {
                    let radius = 1000 + Math.random() * 800;
                    let theta = Math.random() * Math.PI * 2;
                    let phi = Math.acos((Math.random() * 2) - 1);
                    
                    targets[i3] = radius * Math.sin(phi) * Math.cos(theta);
                    targets[i3+1] = Math.abs(radius * Math.cos(phi)) + 100;
                    targets[i3+2] = radius * Math.sin(phi) * Math.sin(theta) - 500; 
                    
                    targetColors[i3] = 0.05;
                    targetColors[i3+1] = 0.08;
                    targetColors[i3+2] = 0.15;
                }
            }
        };

        function animate() {
            requestAnimationFrame(animate);
            const time = clock.getElapsedTime();

            if (droneSystem) {
                const posAttr = droneSystem.geometry.attributes.position;
                const colAttr = droneSystem.geometry.attributes.color;
                
                const posArray = posAttr.array;
                const colArray = colAttr.array;

                for (let i = 0; i < DRONE_COUNT; i++) {
                    const i3 = i * 3;
                    
                    let dx = targets[i3] - posArray[i3];
                    let dy = targets[i3+1] - posArray[i3+1];
                    let dz = targets[i3+2] - posArray[i3+2];

                    velocities[i3] += dx * SPRING_STRENGTH;
                    velocities[i3+1] += dy * SPRING_STRENGTH;
                    velocities[i3+2] += dz * SPRING_STRENGTH;

                    velocities[i3] *= DAMPING;
                    velocities[i3+1] *= DAMPING;
                    velocities[i3+2] *= DAMPING;

                    posArray[i3] += velocities[i3];
                    posArray[i3+1] += velocities[i3+1];
                    posArray[i3+2] += velocities[i3+2];

                    if (currentState !== 0 && targets[i3+2] > -400) {
                        posArray[i3+1] += Math.sin(time * 2 + i * 0.1) * 0.15; 
                    }

                    const colorLerp = 0.06;
                    colArray[i3] += (targetColors[i3] - colArray[i3]) * colorLerp;
                    colArray[i3+1] += (targetColors[i3+1] - colArray[i3+1]) * colorLerp;
                    colArray[i3+2] += (targetColors[i3+2] - colArray[i3+2]) * colorLerp;
                }

                posAttr.needsUpdate = true;
                colAttr.needsUpdate = true;
            }

            // ONLY updates user controls, no forced automatic rotation
            controls.update();
            composer.render();
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        }
    </script>
